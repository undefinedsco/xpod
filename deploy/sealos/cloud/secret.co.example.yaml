apiVersion: v1
kind: Secret
metadata:
  name: xpod-cloud-secret
  namespace: xpod-cloud
type: Opaque
stringData:
  # Supabase PostgreSQL（建议 direct connection）
  CSS_SPARQL_ENDPOINT: postgresql://postgres:replace-me@db.your-project-ref.supabase.co:5432/postgres?sslmode=require
  CSS_IDENTITY_DB_URL: postgresql://postgres:replace-me@db.your-project-ref.supabase.co:5432/postgres?sslmode=require
  # 如启用向量检索，请先在 Supabase 打开 pgvector 扩展

  # Cloudflare R2 (S3 兼容，零出站费)
  CSS_MINIO_ENDPOINT: https://<account-id>.r2.cloudflarestorage.com
  CSS_MINIO_ACCESS_KEY: replace-me
  CSS_MINIO_SECRET_KEY: replace-me
  CSS_MINIO_BUCKET_NAME: xpod

  # Upstash Redis（TLS）
  CSS_REDIS_CLIENT: rediss://default:replace-me@your-database.upstash.io:6379

  # Cloudflare DNS
  CLOUDFLARE_API_TOKEN: replace-me
  CLOUDFLARE_ACCOUNT_ID: replace-me

  # ai-gateway
  DEFAULT_API_BASE: http://ai-gateway.ns-xxxx.svc.cluster.local/v1
  # xpod 调 ai-gateway 使用的 virtual key，必须是 sk-...
  DEFAULT_API_KEY: sk-replace-me-xpod-virtual-key
  # 短查询请求（如 /v1/models）timeout
  DEFAULT_TIMEOUT_MS: "30000"
  # 生成请求（chat/responses/messages/stream）timeout
  DEFAULT_GENERATION_TIMEOUT_MS: "120000"
  DEFAULT_MODEL: linx-lite

  # Optional SMTP
  CSS_EMAIL_CONFIG_AUTH_PASS: replace-me
