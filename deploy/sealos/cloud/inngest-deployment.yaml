apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpod-inngest
  namespace: xpod-cloud
  labels:
    app: xpod-inngest
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: xpod-inngest
  template:
    metadata:
      labels:
        app: xpod-inngest
    spec:
      containers:
        - name: inngest
          image: inngest/inngest:v1.19.4
          imagePullPolicy: IfNotPresent
          command:
            - inngest
          args:
            - start
            - --host
            - 0.0.0.0
            - --port
            - "8288"
            - --sdk-url
            - http://xpod/api/inngest
            - --poll-interval
            - "60"
            - --queue-workers
            - "10"
            - --tick
            - "1000"
            - --postgres-uri
            - "$(CSS_IDENTITY_DB_URL)"
            - --redis-uri
            - "$(CSS_REDIS_CLIENT)"
            - --event-key
            - "$(XPOD_INNGEST_EVENT_KEY)"
            - --signing-key
            - "$(XPOD_INNGEST_SIGNING_KEY)"
          ports:
            - name: http
              containerPort: 8288
              protocol: TCP
          envFrom:
            - secretRef:
                name: xpod-cloud-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 50m
              memory: 128Mi
