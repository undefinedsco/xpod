apiVersion: v1
kind: ConfigMap
metadata:
  name: xpod-cloud-config
  namespace: xpod-cloud
data:
  NODE_ENV: production
  XPOD_EDITION: cloud
  XPOD_PORT: "3000"
  CSS_PORT: "6300"
  API_PORT: "6301"
  CSS_LOGGING_LEVEL: info
  XPOD_EDGE_NODES_ENABLED: "true"

  # Domain, storage and external service settings should be injected via
  # Secret / APP_ENV_FILE instead of hard-coded defaults here.
