apiVersion: v1
kind: Secret
metadata:
  name: xpod-cloud-secret
  namespace: xpod-cloud
type: Opaque
stringData:
  # PostgreSQL (Sealos 内部)
  CSS_SPARQL_ENDPOINT: postgresql://user:pass@postgresql.default.svc.cluster.local:5432/xpod
  CSS_IDENTITY_DB_URL: postgresql://user:pass@postgresql.default.svc.cluster.local:5432/xpod

  # 腾讯云 COS (S3 兼容)
  CSS_MINIO_ENDPOINT: cos.ap-guangzhou.myqcloud.com
  CSS_MINIO_ACCESS_KEY: replace-me
  CSS_MINIO_SECRET_KEY: replace-me
  CSS_MINIO_BUCKET_NAME: xpod
  CSS_MINIO_USE_SSL: "true"
  CSS_MINIO_PORT: "443"

  # Redis (Sealos 内部，同 namespace 内网 Service)
  CSS_REDIS_CLIENT: redis://redis:6379

  # Inngest（xpod 内部 worker）
  XPOD_INNGEST_EVENT_KEY: evt-replace-me
  # 必须是偶数长度 hex 字符串；生成例子：openssl rand -hex 32
  XPOD_INNGEST_SIGNING_KEY: 0123456789abcdef0123456789abcdef

  # 腾讯云 DNS
  XPOD_TENCENT_DNS_TOKEN_ID: replace-me
  XPOD_TENCENT_DNS_TOKEN: replace-me

  # Optional SMTP
  CSS_EMAIL_CONFIG_AUTH_PASS: replace-me
