apiVersion: v1
kind: ConfigMap
metadata:
  name: xpod-cloud-config
  namespace: xpod-cloud
data:
  NODE_ENV: production
  XPOD_EDITION: cloud
  XPOD_PORT: "3000"
  CSS_PORT: "6300"
  API_PORT: "6301"
  CSS_LOGGING_LEVEL: info

  # Public entry domain (HTTPS required in production)
  CSS_BASE_URL: https://id.undefineds.co
  # Optional OIDC issuer; if omitted, defaults to CSS_BASE_URL
  CSS_ALLOWED_HOSTS: id.undefineds.co,pods.undefineds.co,api.undefineds.co

  # Cloud features
  XPOD_EDGE_NODES_ENABLED: "true"
  CSS_BASE_STORAGE_DOMAIN: undefineds.site
