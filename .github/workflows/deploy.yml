name: Deploy

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to deploy (e.g. v0.2.3, 0.2.3, sha-abc1234)"
        required: false
        default: ''
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - all
          - co
          - cn
        default: all

permissions:
  contents: read
  packages: read

jobs:
  deploy-cn:
    name: Deploy to .cn
    runs-on: ubuntu-latest
    environment: cn
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'cn')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          IMAGE_TAG="${INPUT_IMAGE_TAG#v}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::workflow_dispatch 时必须提供 image-tag"
            exit 1
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          for attempt in $(seq 1 60); do
            if docker manifest inspect "ghcr.io/undefinedsco/xpod:${IMAGE_TAG}" > /dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::Image ghcr.io/undefinedsco/xpod:${IMAGE_TAG} not found"
          exit 1

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#image: ghcr.io/undefinedsco/xpod:.*#image: ghcr.io/undefinedsco/xpod:${{ steps.image.outputs.image_tag }}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout restart deployment/xpod-cloud -n "$SEALOS_NAMESPACE"
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s

      - name: Dump diagnostics on failure
        if: failure()
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl -n "$SEALOS_NAMESPACE" get deploy,rs,pods -o wide || true
          kubectl -n "$SEALOS_NAMESPACE" describe deployment xpod-cloud || true
          kubectl -n "$SEALOS_NAMESPACE" describe pods -l app=xpod-cloud || true
          kubectl -n "$SEALOS_NAMESPACE" logs deployment/xpod-cloud --all-containers=true --tail=200 || true

  deploy-co:
    name: Deploy to .co
    runs-on: ubuntu-latest
    environment: co
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')) ||
      (github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'co'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: image
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            IMAGE_TAG="${WORKFLOW_HEAD_BRANCH#v}"
          else
            IMAGE_TAG="${INPUT_IMAGE_TAG#v}"
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::workflow_dispatch 时必须提供 image-tag"
            exit 1
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          for attempt in $(seq 1 60); do
            if docker manifest inspect "ghcr.io/undefinedsco/xpod:${IMAGE_TAG}" > /dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::Image ghcr.io/undefinedsco/xpod:${IMAGE_TAG} not found"
          exit 1

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#image: ghcr.io/undefinedsco/xpod:.*#image: ghcr.io/undefinedsco/xpod:${{ steps.image.outputs.image_tag }}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout restart deployment/xpod-cloud -n "$SEALOS_NAMESPACE"
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s

      - name: Dump diagnostics on failure
        if: failure()
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl -n "$SEALOS_NAMESPACE" get deploy,rs,pods -o wide || true
          kubectl -n "$SEALOS_NAMESPACE" describe deployment xpod-cloud || true
          kubectl -n "$SEALOS_NAMESPACE" describe pods -l app=xpod-cloud || true
          kubectl -n "$SEALOS_NAMESPACE" logs deployment/xpod-cloud --all-containers=true --tail=200 || true
