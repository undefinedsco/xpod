name: Deploy

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Immutable image tag to deploy (e.g. 0.2.1, sha-abc1234)"
        required: true
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - all
          - co
          - cn
        default: all

jobs:
  deploy-cn:
    name: Deploy to .cn
    runs-on: ubuntu-latest
    environment: cn
    concurrency:
      group: xpod-deploy-cn
      cancel-in-progress: false
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'cn')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Ensure namespace
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          if kubectl get namespace "$SEALOS_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace $SEALOS_NAMESPACE already exists"
          else
            kubectl create namespace "$SEALOS_NAMESPACE"
          fi

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/configmap.yaml > /tmp/xpod-configmap.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#image: ghcr.io/undefinedsco/xpod:.*#image: ghcr.io/undefinedsco/xpod:${IMAGE_TAG}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-configmap.yaml
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s

  deploy-co:
    name: Deploy to .co
    runs-on: ubuntu-latest
    environment: co
    concurrency:
      group: xpod-deploy-co
      cancel-in-progress: false
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'co')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Ensure namespace
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          if kubectl get namespace "$SEALOS_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace $SEALOS_NAMESPACE already exists"
          else
            kubectl create namespace "$SEALOS_NAMESPACE"
          fi

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/configmap.yaml > /tmp/xpod-configmap.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#image: ghcr.io/undefinedsco/xpod:.*#image: ghcr.io/undefinedsco/xpod:${IMAGE_TAG}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-configmap.yaml
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s
