name: Deploy

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to deploy (e.g. v0.1.0, sha-abc1234)"
        required: false
        default: latest
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - all
          - cn
          - sg
        default: all

jobs:
  deploy-cn:
    name: Deploy to China (Guangzhou)
    runs-on: ubuntu-latest
    environment: cn
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'cn')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Prepare registry secret
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          kubectl -n "$SEALOS_NAMESPACE" create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#ghcr.io/undefinedsco/xpod:0.2.0#ghcr.io/undefinedsco/xpod:${{ inputs.image-tag }}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s

  deploy-sg:
    name: Deploy to Singapore
    runs-on: ubuntu-latest
    environment: sg
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.environment == 'all' || inputs.environment == 'sg')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Prepare registry secret
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          kubectl -n "$SEALOS_NAMESPACE" create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply runtime secret
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          printf '%s\n' "$APP_ENV_FILE" > /tmp/xpod.env
          kubectl -n "$SEALOS_NAMESPACE" create secret generic xpod-cloud-secret \
            --from-env-file=/tmp/xpod.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
        run: |
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            -e "s#ghcr.io/undefinedsco/xpod:0.2.0#ghcr.io/undefinedsco/xpod:${{ inputs.image-tag }}#g" \
            deploy/sealos/cloud/deployment.yaml > /tmp/xpod-deployment.yaml
          sed \
            -e "s#namespace: xpod-cloud#namespace: ${SEALOS_NAMESPACE}#g" \
            deploy/sealos/cloud/service.yaml > /tmp/xpod-service.yaml

      - name: Apply manifests
        env:
          SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/xpod-service.yaml
          kubectl apply -f /tmp/xpod-deployment.yaml
          kubectl rollout status deployment/xpod-cloud -n "$SEALOS_NAMESPACE" --timeout=300s
