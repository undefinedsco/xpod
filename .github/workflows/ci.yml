name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Check platform package versions
        run: bun run check:platform-package-version

      - name: Type check
        run: bun run build:ts

      - name: Build Components artifacts
        run: bun run build:components

      - name: Unit tests
        run: bun run test:run

  integration-lite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Build runtime artifacts
        run: bun run build:ts && bun run build:components

      - name: Lite integration tests
        run: bun run test:integration:lite

  bun-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Bun runtime smoke
        run: bun run test:bun:runtime

  integration-full:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Build runtime artifacts
        run: bun run build:ts && bun run build:components

      - name: Full integration tests
        run: bun run test:integration:full

  package-smoke:
    name: package-smoke (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      XPOD_INSTALL_REGISTRY: ${{ vars.XPOD_INSTALL_REGISTRY }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24, 25]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Check platform package versions
        run: bun run check:platform-package-version

      - name: Build package
        run: bun run build

      - name: Pack npm tarball
        run: node scripts/run-npm-pack.cjs .test-data/npm-pack .test-data/npm-cache

      - name: Verify npm tarball contents
        run: node scripts/check-pack-json.cjs .test-data/npm-pack/pack.json

      - name: Install tarball in clean consumer workspace
        run: node scripts/package-smoke-install.cjs .test-data/npm-pack/pack.json "${{ runner.temp }}/xpod-package-smoke" .test-data/npm-cache

      - name: Consumer runtime smoke
        run: node scripts/package-consumer-smoke.cjs "${{ runner.temp }}/xpod-package-smoke"

  package-smoke-bun:
    name: package-smoke-bun (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      XPOD_INSTALL_REGISTRY: ${{ vars.XPOD_INSTALL_REGISTRY }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24, 25]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Check platform package versions
        run: bun run check:platform-package-version

      - name: Build package
        run: bun run build

      - name: Pack npm tarball
        run: node scripts/run-npm-pack.cjs .test-data/npm-pack .test-data/npm-cache

      - name: Verify npm tarball contents
        run: node scripts/check-pack-json.cjs .test-data/npm-pack/pack.json

      - name: Install tarball with Bun in clean consumer workspace
        run: node scripts/package-smoke-install.cjs .test-data/npm-pack/pack.json "${{ runner.temp }}/xpod-package-smoke-bun" .test-data/bun-cache bun

      - name: Consumer runtime smoke under Bun
        run: bun scripts/package-consumer-smoke.cjs "${{ runner.temp }}/xpod-package-smoke-bun"
